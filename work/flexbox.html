<!DOCTYPE html>
<html>
    <head>
        <title>flexbox practice</title>
    </head>
    <body style="padding-bottom: 1000px;">
        <div  style="
            display: flex;
            flex-direction: row;">
            <div style="background-color: lightblue;">div 1 text</div>
            <div style="background-color: lightpink;">div 2<p>text</p></div>
        </div>
        <div  style="
            margin-top: 30px;
            width: 100px;
            display: flex;
            flex-direction: row;">
            <div style="background-color: lightblue;">100pxt</div>
            <div style="background-color: lightpink; flex: 1;">flex: 1</div>
        </div>
        <div  style="
            margin-top: 30px;
            display: flex;
            flex-direction: row;">
            <div style="background-color: lightblue;">100pxt</div>
            <div style="background-color: lightpink; flex: 1;">flex: 1</div>
            <div style="background-color: lightblue; flex: 2;">flex: 2</div>
        </div>
        <div  style="
            margin-top: 30px;
            height: 70px;
            border-width: 1px;
            border-style: solid;
            border-color: gray;
            display: flex;
            flex-direction: row;
            justify-content: center;">
            <div style="background-color: lightblue; width: 100px;">100pxt</div>
            <div style="background-color: lightpink; flex: 1; width: 100px;">flex: 1</div>
            <div style="background-color: lightblue; flex: 2; width: 100px;">flex: 2</div>
        </div>




    </body>
</html>
